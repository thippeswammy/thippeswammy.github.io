<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;--glass:rgba(8,12,30,0.88);--border:rgba(255,255,255,0.07);
  --c-robotics:#06b6d4;--c-ai:#3b82f6;--c-games:#a855f7;
  --c-embedded:#f97316;--c-apps:#22c55e;--c-tools:#ec4899;
  --c-primary:#6366f1;--font-h:'Orbitron',monospace;--font-b:'Inter',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-b);color:#f1f5f9}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

/* Loading */
#load{position:fixed;inset:0;z-index:1000;background:#04040a;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;transition:opacity .7s ease}
#load.out{opacity:0;pointer-events:none}
.l-logo{font-family:var(--font-h);font-size:1.8rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.l-bar{width:200px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.l-fill{height:100%;width:0;background:linear-gradient(90deg,#6366f1,#06b6d4);border-radius:2px;animation:lf 2s ease forwards}
@keyframes lf{to{width:100%}}
.l-sub{font-size:.65rem;color:#475569;letter-spacing:3px;text-transform:uppercase}

/* Fade overlay for world transitions */
#fade{position:fixed;inset:0;z-index:900;background:#04040a;opacity:0;pointer-events:none;transition:opacity .45s ease}
#fade.on{opacity:1}

/* UI layer */
#ui{position:fixed;inset:0;z-index:100;pointer-events:none}
#ui>*{pointer-events:auto}

/* Top bar */
#topbar{position:absolute;top:18px;left:18px;display:flex;align-items:center;gap:12px;
  padding:9px 16px;background:var(--glass);border:1px solid var(--border);border-radius:40px;
  backdrop-filter:blur(20px)}
#topbar img{width:32px;height:32px;border-radius:50%;border:2px solid var(--c-primary)}
.tb-name{font-family:var(--font-h);font-size:.68rem;font-weight:700;letter-spacing:2px;color:#e2e8f0}
.tb-gh{font-size:.6rem;color:#64748b;text-decoration:none;letter-spacing:1px;transition:color .2s}
.tb-gh:hover{color:var(--c-primary)}

/* Back button */
#back{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  padding:9px 22px;background:var(--glass);border:1px solid var(--border);border-radius:40px;
  backdrop-filter:blur(20px);font-family:var(--font-h);font-size:.65rem;letter-spacing:2px;
  color:#94a3b8;cursor:pointer;display:none;align-items:center;gap:8px;transition:all .2s}
#back:hover{color:#f1f5f9;border-color:rgba(255,255,255,.18)}

/* Cluster label (top-right when in a world) */
#clabel{position:absolute;top:18px;right:18px;padding:9px 18px;
  background:var(--glass);border:1px solid var(--border);border-radius:40px;
  backdrop-filter:blur(20px);font-family:var(--font-h);font-size:.65rem;
  letter-spacing:2px;color:#94a3b8;display:none}

/* Hint text at bottom of lobby */
#hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:.65rem;color:#334155;letter-spacing:3px;text-transform:uppercase;
  text-align:center;transition:opacity .4s}

/* Info panel */
#panel{position:absolute;top:0;right:0;width:380px;height:100%;
  background:var(--glass);border-left:1px solid var(--border);
  backdrop-filter:blur(28px);transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;pointer-events:auto}
#panel.open{transform:translateX(0)}
.p-head{padding:28px 24px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.p-cluster-badge{font-size:.55rem;letter-spacing:3px;text-transform:uppercase;
  font-family:var(--font-h);margin-bottom:10px;opacity:.8}
.p-title{font-family:var(--font-h);font-size:1.1rem;font-weight:700;letter-spacing:1px;
  line-height:1.3;margin-bottom:6px}
.p-tagline{font-size:.78rem;color:#94a3b8;line-height:1.5}
.p-body{padding:20px 24px;flex:1;overflow-y:auto}
.p-body::-webkit-scrollbar{width:4px}
.p-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.p-summary{font-size:.82rem;color:#cbd5e1;line-height:1.7;margin-bottom:18px}
.p-h4{font-family:var(--font-h);font-size:.6rem;letter-spacing:3px;color:#475569;
  text-transform:uppercase;margin-bottom:10px}
.p-bullets{list-style:none;margin-bottom:20px}
.p-bullets li{font-size:.78rem;color:#94a3b8;padding:4px 0 4px 16px;position:relative;line-height:1.5}
.p-bullets li::before{content:'';position:absolute;left:0;top:11px;
  width:6px;height:6px;border-radius:50%;background:var(--accent,#6366f1)}
.p-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.p-tag{padding:4px 10px;border-radius:20px;font-size:.62rem;letter-spacing:1px;
  font-family:var(--font-h);border:1px solid;opacity:.85}
.p-footer{padding:18px 24px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:10px;align-items:center}
.p-gh-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;
  border-radius:8px;font-family:var(--font-h);font-size:.65rem;letter-spacing:1px;
  text-decoration:none;transition:all .2s;border:1px solid var(--border)}
.p-gh-btn:hover{transform:translateY(-1px)}
.p-private{font-size:.65rem;color:#64748b;display:flex;align-items:center;gap:6px}
.p-close{margin-left:auto;width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:#64748b;cursor:pointer;font-size:1rem;transition:all .2s;
  display:flex;align-items:center;justify-content:center}
.p-close:hover{color:#f1f5f9;border-color:rgba(255,255,255,.2)}
</style>

// ─── UTILITIES ───────────────────────────────────────────────────────────────
function mkMesh(geo, mat){ return new THREE.Mesh(geo, mat); }
function mkBox(w,h,d,color,opts={}){
  const mat=new THREE.MeshStandardMaterial({color,...opts});
  return mkMesh(new THREE.BoxGeometry(w,h,d),mat);
}
function mkSphere(r,color,opts={}){
  const mat=new THREE.MeshStandardMaterial({color,...opts});
  return mkMesh(new THREE.SphereGeometry(r,16,16),mat);
}
function mkLabel(text,fontSize=28,textColor='#ffffff',bgColor=null){
  const cv=document.createElement('canvas');
  cv.width=512; cv.height=128;
  const ctx=cv.getContext('2d');
  if(bgColor){ctx.fillStyle=bgColor;ctx.fillRect(0,0,512,128);}
  ctx.fillStyle=textColor;
  ctx.font=`${fontSize}px Orbitron,monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,256,64);
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(4,1,1);
  return sp;
}
function mkLabelSmall(text,textColor='#e2e8f0'){
  const cv=document.createElement('canvas');cv.width=512;cv.height=80;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=textColor;
  ctx.font='bold 22px Orbitron,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,256,40);
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sp=new THREE.Sprite(mat);sp.scale.set(3,.6,1);return sp;
}
function mkScreen(w,h,text,color='#0a1628',textColor='#00d4ff'){
  const cv=document.createElement('canvas');cv.width=512;cv.height=256;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=color;ctx.fillRect(0,0,512,256);
  ctx.strokeStyle=textColor;ctx.lineWidth=2;ctx.strokeRect(4,4,504,248);
  ctx.fillStyle=textColor;
  ctx.font='bold 20px Orbitron,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const words=text.split('\n');
  words.forEach((l,i)=>ctx.fillText(l,256,128+(i-(words.length-1)/2)*30));
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.MeshStandardMaterial({map:tex,emissive:new THREE.Color(textColor),emissiveIntensity:.1});
  return mkMesh(new THREE.PlaneGeometry(w,h),mat);
}
function mkGround(size,color){
  const mat=new THREE.MeshStandardMaterial({color,roughness:.8,metalness:.1});
  const m=mkMesh(new THREE.PlaneGeometry(size,size),mat);
  m.rotation.x=-Math.PI/2; return m;
}
function mkGridLines(size,div,color){
  const g=new THREE.GridHelper(size,div,color,color);
  g.material.opacity=.18;g.material.transparent=true;return g;
}
function addLight(scene,x,y,z,color,intensity=1.2,dist=12){
  const l=new THREE.PointLight(color,intensity,dist);l.position.set(x,y,z);scene.add(l);return l;
}
function setProjectable(mesh,projectId){
  mesh.traverse(o=>{if(o.isMesh)o.userData.projectId=projectId;});
}
// PORTAL SHADER
const portalVS=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const portalFS=`
uniform float t;uniform vec3 col;varying vec2 vUv;
void main(){
  vec2 uv=vUv-.5;float d=length(uv);
  float angle=atan(uv.y,uv.x)+t*.6;
  float sw=sin(angle*5.+d*12.-t*2.)*.5+.5;
  float v=smoothstep(.5,.0,d)*sw*(1.-d*2.);
  gl_FragColor=vec4(col*v,v*.85);
}`;
// ─── LOBBY SCENE ─────────────────────────────────────────────────────────────
class LobbyScene {
  constructor(scene){
    this.scene=scene; this.group=new THREE.Group(); this.portals=[];
    this.uniforms=[]; this.time=0;
    scene.add(this.group);
  }
  build(){
    const g=this.group;
    // Floor
    const floor=mkGround(60,0x0d1117); floor.receiveShadow=true; g.add(floor);
    const grid=mkGridLines(60,30,0x1e293b); g.add(grid);
    // Title sprite
    const title=mkLabel('3D PORTFOLIO PORTAL',32,'#e2e8f0');
    title.position.set(0,7,-8); title.scale.set(7,1.5,1); g.add(title);
    const sub=mkLabel('SELECT A CLUSTER TO BEGIN',18,'#475569');
    sub.position.set(0,5.8,-8); sub.scale.set(6,1,1); g.add(sub);
    // Ambient + key
    g.add(new THREE.AmbientLight(0x0f172a,2));
    const key=new THREE.DirectionalLight(0xffffff,.4);key.position.set(0,10,-5);g.add(key);
    // 6 portals in semi-circle
    const count=CLUSTERS.length;
    const radius=10, startAngle=-Math.PI*.55, spread=Math.PI*1.1;
    CLUSTERS.forEach((cl,i)=>{
      const a=startAngle+(i/(count-1))*spread;
      const px=Math.sin(a)*radius, pz=-Math.abs(Math.cos(a))*radius-2;
      const pg=this._makePortal(cl,px,pz);
      pg.userData.clusterId=cl.id;
      this.portals.push(pg); g.add(pg);
    });
  }
  _makePortal(cl,px,pz){
    const g=new THREE.Group(); g.position.set(px,0,pz);
    // Look toward camera
    g.lookAt(0,2,12);
    const col=new THREE.Color(cl.color);
    // Pillars
    const pilMat=new THREE.MeshStandardMaterial({color:0x1e293b,metalness:.7,roughness:.3,emissive:col,emissiveIntensity:.06});
    const pilL=mkMesh(new THREE.BoxGeometry(.35,5.5,.35),pilMat); pilL.position.set(-1.3,2.75,0); g.add(pilL);
    const pilR=mkMesh(new THREE.BoxGeometry(.35,5.5,.35),pilMat.clone()); pilR.position.set(1.3,2.75,0); g.add(pilR);
    // Arch top (torus half)
    const archGeo=new THREE.TorusGeometry(1.3,.18,8,24,Math.PI);
    const archMat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.5,metalness:.5});
    const arch=mkMesh(archGeo,archMat); arch.position.set(0,5.5,0); arch.rotation.z=Math.PI; g.add(arch);
    // Portal surface (shader)
    const uni={t:{value:0},col:{value:new THREE.Color(cl.color)}};
    this.uniforms.push(uni);
    const portalMat=new THREE.ShaderMaterial({vertexShader:portalVS,fragmentShader:portalFS,uniforms:uni,transparent:true,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
    const portalSurface=mkMesh(new THREE.PlaneGeometry(2.6,5.5),portalMat);
    portalSurface.position.set(0,2.75,-.02);
    portalSurface.userData.clusterId=cl.id;
    g.add(portalSurface);
    // Cluster label
    const lbl=mkLabel(cl.label,24,cl.css);
    lbl.position.set(0,6.4,0); lbl.scale.set(3.5,.8,1); g.add(lbl);
    // Count label
    const cnt=PROJECTS.filter(p=>p.cluster===cl.id).length;
    const sub=mkLabel(`${cl.emoji}  ${cnt} PROJECTS`,16,'#64748b');
    sub.position.set(0,-.5,0); sub.scale.set(3,.7,1); g.add(sub);
    // Glow point light
    const pl=new THREE.PointLight(cl.color,1.5,6); pl.position.set(0,3,1); g.add(pl);
    return g;
  }
  update(dt){
    this.time+=dt;
    this.uniforms.forEach((u,i)=>{u.t.value=this.time+i*1.3;});
  }
  show(){this.group.visible=true;}
  hide(){this.group.visible=false;}
  getPortals(){return this.portals;}
}

// ─── BASE WORLD ───────────────────────────────────────────────────────────────
class BaseWorld {
  constructor(id,scene){this.id=id;this.scene=scene;this.group=new THREE.Group();this.interactables=[];this.animators=[];this.built=false;}
  build(){this.scene.add(this.group);this.built=true;}
  update(dt){this.animators.forEach(fn=>fn(dt));}
  show(){this.group.visible=true;}
  hide(){this.group.visible=false;}
  addAnimator(fn){this.animators.push(fn);}
  addProjectable(obj,pid){setProjectable(obj,pid);this.interactables.push(obj);}
}

}

// ─── APP CONTROLLER ───────────────────────────────────────────────────────────
class App {
  constructor(){
    this.renderer=null;this.scene=null;this.camera=null;this.controls=null;
    this.clock=new THREE.Clock();this.raycaster=new THREE.Raycaster();
    this.mouse=new THREE.Vector2();this.state='lobby';this.activeWorld=null;
    this.lobby=null;this.worlds={};this.hoveredId=null;
    this.$load=document.getElementById('load');
    this.$fade=document.getElementById('fade');
    this.$back=document.getElementById('back');
    this.$clabel=document.getElementById('clabel');
    this.$hint=document.getElementById('hint');
    this.$panel=document.getElementById('panel');
  }
  init(){
    // Renderer
    const canvas=document.getElementById('c');
    this.renderer=new THREE.WebGLRenderer({canvas,antialias:true});
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    this.renderer.setSize(window.innerWidth,window.innerHeight);
    this.renderer.toneMapping=THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure=1;
    // Scene + Camera
    this.scene=new THREE.Scene();
    this.scene.background=new THREE.Color(0x06060f);
    this.camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,.1,200);
    this.camera.position.set(0,5,16);
    this.camera.lookAt(0,3,0);
    // Orbit Controls
    this.controls=new OrbitControls(this.camera,canvas);
    this.controls.enableDamping=true;this.controls.dampingFactor=.05;
    this.controls.maxPolarAngle=Math.PI*.6;this.controls.minDistance=4;this.controls.maxDistance=30;
    this.controls.target.set(0,2,0);
    // Stars background
    this._addStars();
    // Build lobby
    this.lobby=new LobbyScene(this.scene);this.lobby.build();
    // Build all worlds (hidden)
    const worldClasses={robotics:RoboticsWorld,ai:AICVWorld,games:GamesWorld,embedded:EmbeddedWorld,apps:AppsWorld,tools:ToolsWorld};
    Object.entries(worldClasses).forEach(([id,Cls])=>{const w=new Cls(this.scene);w.build();w.hide();this.worlds[id]=w;});
    // Events
    window.addEventListener('resize',()=>this._onResize());
    canvas.addEventListener('mousemove',e=>this._onMouseMove(e));
    canvas.addEventListener('click',e=>this._onClick(e));
    this.$back.addEventListener('click',()=>this._goLobby());
    document.querySelector('.p-close')?.addEventListener('click',()=>this._closePanel());
    document.getElementById('p-footer').addEventListener('click',()=>{});
    // Hide loading
    setTimeout(()=>{this.$load.classList.add('out');this._loop();},2200);
  }
  _addStars(){
    const geo=new THREE.BufferGeometry();const pos=new Float32Array(3000);
    for(let i=0;i<3000;i+=3){pos[i]=(Math.random()-.5)*200;pos[i+1]=(Math.random()-.5)*200;pos[i+2]=(Math.random()-.5)*200;}
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    this.scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x8899aa,size:.15,transparent:true,opacity:.7})));
  }
  _onResize(){
    this.camera.aspect=window.innerWidth/window.innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(window.innerWidth,window.innerHeight);
  }
  _onMouseMove(e){
    this.mouse.x=(e.clientX/window.innerWidth)*2-1;
    this.mouse.y=-(e.clientY/window.innerHeight)*2+1;
  }
  _onClick(e){
    // Don't process click if panel is open and clicking outside
    if(this.$panel.classList.contains('open')){this._closePanel();return;}
    this.raycaster.setFromCamera(this.mouse,this.camera);
    if(this.state==='lobby'){
      const portals=this.lobby.getPortals();
      const allMeshes=[];portals.forEach(p=>p.traverse(o=>{if(o.isMesh||o.isSprite)allMeshes.push(o);}));
      const hits=this.raycaster.intersectObjects(allMeshes,false);
      if(hits.length>0){
        let obj=hits[0].object;
        while(obj&&!obj.userData.clusterId)obj=obj.parent;
        if(obj?.userData.clusterId)this._enterWorld(obj.userData.clusterId);
      }
    } else if(this.state==='world'&&this.activeWorld){
      const allInt=[];this.activeWorld.interactables.forEach(g=>g.traverse(o=>{if(o.isMesh)allInt.push(o);}));
      const hits=this.raycaster.intersectObjects(allInt,false);
      if(hits.length>0){
        let obj=hits[0].object;
        while(obj&&!obj.userData.projectId)obj=obj.parent;
        if(obj?.userData.projectId){const proj=PROJECTS.find(p=>p.id===obj.userData.projectId);if(proj)this._openPanel(proj);}
      }
    }
  }
  _enterWorld(clusterId){
    const cl=CLUSTERS.find(c=>c.id===clusterId);if(!cl)return;
    this.$fade.classList.add('on');
    setTimeout(()=>{
      this.lobby.hide();
      Object.values(this.worlds).forEach(w=>w.hide());
      const world=this.worlds[clusterId];world.show();this.activeWorld=world;
      this.scene.fog=null;world.build&&!world.built?world.build():null;
      // Reset camera into world
      this.camera.position.set(0,6,14);this.camera.lookAt(0,2,0);
      this.controls.target.set(0,2,0);this.controls.update();
      this.scene.background=new THREE.Color(0x04040a);
      this.$back.style.display='flex';
      this.$clabel.style.display='block';
      this.$clabel.textContent=`${cl.emoji} ${cl.full}`;
      this.$clabel.style.color=cl.css;
      this.$hint.style.opacity='0';
      this.state='world';
      this.$fade.classList.remove('on');
    },450);
  }
  _goLobby(){
    this._closePanel();
    this.$fade.classList.add('on');
    setTimeout(()=>{
      Object.values(this.worlds).forEach(w=>w.hide());this.activeWorld=null;
      this.lobby.show();
      this.scene.fog=null;
      this.scene.background=new THREE.Color(0x06060f);
      this.camera.position.set(0,5,16);this.camera.lookAt(0,3,0);
      this.controls.target.set(0,2,0);this.controls.update();
      this.$back.style.display='none';
      this.$clabel.style.display='none';
      this.$hint.style.opacity='1';
      this.state='lobby';
      this.$fade.classList.remove('on');
    },450);
  }
  _openPanel(proj){
    const cl=CLUSTERS.find(c=>c.id===proj.cluster);
    const accentCss=cl?cl.css:'#6366f1';
    document.getElementById('p-badge').textContent=`${cl?.emoji||''} ${cl?.full||''}`;
    document.getElementById('p-badge').style.color=accentCss;
    document.getElementById('p-title').textContent=proj.name;
    document.getElementById('p-title').style.color=accentCss;
    document.getElementById('p-tagline').textContent=proj.tagline||'';
    document.getElementById('p-summary').textContent=proj.summary||'';
    // Highlights
    const ul=document.getElementById('p-bullets');ul.innerHTML='';
    (proj.highlights||[]).forEach(h=>{const li=document.createElement('li');li.textContent=h;li.style.setProperty('--accent',accentCss);ul.appendChild(li);});
    // Tech tags
    const tagsCont=document.getElementById('p-tags');tagsCont.innerHTML='';
    (proj.tech||[]).forEach(t=>{const span=document.createElement('span');span.className='p-tag';span.textContent=t;span.style.color=accentCss;span.style.borderColor=accentCss+'55';tagsCont.appendChild(span);});
    // Footer
    const footer=document.getElementById('p-footer');footer.innerHTML='';
    if(proj.isPrivate){
      const priv=document.createElement('div');priv.className='p-private';priv.innerHTML=`🔒 <span>Private Repository</span>`;footer.appendChild(priv);
    } else if(proj.github){
      const btn=document.createElement('a');btn.href=proj.github;btn.target='_blank';btn.className='p-gh-btn';
      btn.style.color=accentCss;btn.style.borderColor=accentCss+'55';
      btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> View on GitHub`;
      footer.appendChild(btn);
    }
    // Add close button to footer
    const closeBtn=document.createElement('button');closeBtn.className='p-close';closeBtn.innerHTML='✕';closeBtn.onclick=()=>this._closePanel();footer.appendChild(closeBtn);
    this.$panel.classList.add('open');
  }
  _closePanel(){this.$panel.classList.remove('open');}
  _loop(){
    requestAnimationFrame(()=>this._loop());
    const dt=Math.min(this.clock.getDelta(),.05);
    this.controls.update();
    if(this.state==='lobby')this.lobby.update(dt);
    else if(this.activeWorld)this.activeWorld.update(dt);
    // Hover highlight in world
    if(this.state==='world'&&this.activeWorld){
      this.raycaster.setFromCamera(this.mouse,this.camera);
      const allInt=[];this.activeWorld.interactables.forEach(g=>g.traverse(o=>{if(o.isMesh)allInt.push(o);}));
      const hits=this.raycaster.intersectObjects(allInt,false);
      document.body.style.cursor=hits.length>0?'pointer':'default';
    } else if(this.state==='lobby'){
      this.raycaster.setFromCamera(this.mouse,this.camera);
      const portals=this.lobby.getPortals();
      const allMeshes=[];portals.forEach(p=>p.traverse(o=>{if(o.isMesh)allMeshes.push(o);}));
      const hits=this.raycaster.intersectObjects(allMeshes,false);
      document.body.style.cursor=hits.length>0?'pointer':'default';
    }
    this.renderer.render(this.scene,this.camera);
  }
}
// ─── BOOT ─────────────────────────────────────────────────────────────────────
const app=new App();app.init();
</script>
